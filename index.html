<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Self-Healing Network Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0e14; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; color: white; border-radius: 12px; }
        .status-box { padding: 20px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .healthy { border: 2px solid #238636; color: #3fb950; background: rgba(35, 134, 54, 0.1); }
        .warning { border: 2px solid #d29922; color: #e3b341; background: rgba(210, 153, 34, 0.1); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .table { color: #c9d1d9; }
        .badge-attack { background-color: #f85149; }
        .badge-normal { background-color: #238636; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row mb-4">
        <div class="col-md-8">
            <h1 class="display-5 fw-bold">Sentinel AI <span class="text-primary">Network</span></h1>
            <p class="text-muted">Autonomous Fault Detection & Self-Healing System</p>
        </div>
        <div class="col-md-4">
            <div id="status-indicator" class="status-box healthy">System: Healthy</div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Live Graph -->
        <div class="col-lg-8">
            <div class="card p-4">
                <h5 class="mb-4">Traffic Analysis (Packets/Sec)</h5>
                <canvas id="trafficChart" height="150"></canvas>
            </div>
        </div>

        <!-- Stats -->
        <div class="col-lg-4">
            <div class="card p-4 mb-4">
                <h5>AI Engine Stats</h5>
                <hr>
                <p>Threats Blocked: <span id="blocked-count" class="badge bg-danger">0</span></p>
                <p>Monitoring Mode: <span class="badge bg-primary">Active</span></p>
                <p>Logic: <span class="text-info">Anomaly Detection</span></p>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="col-12">
            <div class="card p-4">
                <h5>Real-Time Network Event Logs</h5>
                <div class="table-responsive">
                    <table class="table table-dark align-middle">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Source IP</th>
                                <th>Packet Load</th>
                                <th>Action/Status</th>
                            </tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('trafficChart').getContext('2d');
    const trafficChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Network Load',
                data: [],
                borderColor: '#58a6ff',
                backgroundColor: 'rgba(88, 166, 255, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true, max: 200 } } }
    });

    async function fetchData() {
        const res = await fetch('/api/data');
        const data = await res.json();

        // Update Status
        const statusBox = document.getElementById('status-indicator');
        statusBox.innerText = "System: " + data.status;
        statusBox.className = "status-box " + (data.status === "Healthy" ? "healthy" : "warning");

        document.getElementById('blocked-count').innerText = data.blocked_count;

        // Update Table
        const logBody = document.getElementById('log-body');
        logBody.innerHTML = '';
        data.logs.slice().reverse().forEach(log => {
            const badgeClass = log.status.includes('ATTACK') ? 'badge-attack' : (log.status.includes('HEALED') ? 'bg-info' : 'badge-normal');
            logBody.innerHTML += `<tr>
                <td>${log.time}</td>
                <td><code>${log.ip}</code></td>
                <td>${log.packets}</td>
                <td><span class="badge ${badgeClass}">${log.status}</span></td>
            </tr>`;
        });

        // Update Chart
        if (data.logs.length > 0) {
            const latest = data.logs[data.logs.length - 1];
            if (trafficChart.data.labels.length > 15) {
                trafficChart.data.labels.shift();
                trafficChart.data.datasets[0].data.shift();
            }
            trafficChart.data.labels.push(latest.time);
            trafficChart.data.datasets[0].data.push(latest.packets);
            trafficChart.update();
        }
    }

    setInterval(fetchData, 2000);
</script>

</body>
</html>
